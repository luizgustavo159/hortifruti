version: '3.9'

services:
  # ============ DATABASE ============
  postgres:
    image: postgres:15-alpine
    container_name: greenstore-db
    environment:
      POSTGRES_USER: ${DB_USER:-greenstore}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-greenstore}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=pt_BR.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-greenstore}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - greenstore-network

  # ============ REDIS (CACHE) ============
  redis:
    image: redis:7-alpine
    container_name: greenstore-cache
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - greenstore-network

  # ============ APPLICATION ============
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: greenstore-app
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-greenstore}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-greenstore}
      DATABASE_URL: postgres://${DB_USER:-greenstore}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-greenstore}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CORS_ORIGIN: ${CORS_ORIGIN}
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - greenstore-network
    volumes:
      - ./logs:/app/logs

  # ============ NGINX (REVERSE PROXY) ============
  nginx:
    image: nginx:alpine
    container_name: greenstore-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - greenstore-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_cache:
    driver: local

networks:
  greenstore-network:
    driver: bridge
